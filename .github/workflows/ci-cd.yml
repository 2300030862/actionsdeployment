name: Java CI/CD Pipeline - Employee Management API

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== BUILD JOB ====================
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: ['17']

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better analysis

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven

    - name: Display Java Version
      run: java -version

    - name: Cache Maven Packages
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven (Skip Tests)
      run: mvn clean install -DskipTests -q
      continue-on-error: false

    - name: Run Unit Tests
      run: mvn test -q
      continue-on-error: false

    - name: Run Integration Tests
      run: mvn verify -DskipUnitTests -q
      continue-on-error: true

    - name: Generate JaCoCo Coverage Report
      run: mvn jacoco:report -q
      continue-on-error: true

    - name: Publish Test Results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: target/surefire-reports/*.xml
        check_name: Test Results
        comment_mode: always

    - name: Upload Coverage to Codecov
      if: success()
      uses: codecov/codecov-action@v3
      with:
        file: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: SonarQube Analysis (Optional)
      if: success() && secrets.SONAR_TOKEN != ''
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=deployment-service \
          -Dsonar.sources=src/main \
          -Dsonar.tests=src/test \
          -Dsonar.java.binaries=target/classes \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} -q
      continue-on-error: true

    - name: Build Artifact
      run: mvn clean package -DskipTests -q

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: deployment-service-jar
        path: target/*.jar
        retention-days: 30

    - name: Log Build Success
      if: success()
      run: echo "✅ Build and Tests Completed Successfully!"

    - name: Log Build Failure
      if: failure()
      run: echo "❌ Build Failed! Check logs for details."

  # ==================== CODE QUALITY JOB ====================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Run SpotBugs Analysis
      run: mvn spotbugs:check -q
      continue-on-error: true

    - name: Run CheckStyle Analysis
      run: mvn checkstyle:check -q
      continue-on-error: true

    - name: Run PMD Analysis
      run: mvn pmd:check -q
      continue-on-error: true

  # ==================== SECURITY JOB ====================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'deployment-service'
        path: '.'
        format: 'JSON'
        args: >
          --enableExperimental
      continue-on-error: true

    - name: Upload Dependency Check Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: dependency-check-report
        path: reports/
      continue-on-error: true

    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true

    - name: Upload Trivy Results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

  # ==================== DOCKER BUILD JOB ====================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: success()

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ==================== DEPLOY JOB ====================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download Artifact
      uses: actions/download-artifact@v3
      with:
        name: deployment-service-jar

    - name: Display Downloaded Files
      run: ls -la

    - name: Deploy to Production Server
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      run: |
        echo "🚀 Deploying to Production..."
        echo "Deployment configuration:"
        echo "Host: $DEPLOY_HOST"
        echo "User: $DEPLOY_USER"
        # Add your deployment commands here
        # Example: SSH into server and pull latest changes
        echo "✅ Deployment Completed!"
      continue-on-error: true

    - name: Notify Slack (Optional)
      if: always()
      uses: slackapi/slack-github-action@v1
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        payload: |
          {
            "text": "Deployment Status",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ Employee Management API deployed successfully!\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                }
              }
            ]
          }
      continue-on-error: true

  # ==================== NOTIFICATION JOB ====================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [build, security]
    if: always()

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Prepare Notification Message
      id: message
      run: |
        if [ "${{ needs.build.result }}" = "success" ]; then
          echo "status=✅ Build Successful" >> $GITHUB_OUTPUT
          echo "color=good" >> $GITHUB_OUTPUT
        else
          echo "status=❌ Build Failed" >> $GITHUB_OUTPUT
          echo "color=danger" >> $GITHUB_OUTPUT
        fi

    - name: Send Email Notification (Optional)
      if: always()
      run: |
        echo "Build Status: ${{ steps.message.outputs.status }}"
        echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

# ==================== WORKFLOW SUMMARY ====================
# This CI/CD pipeline performs:
# 1. Build: Compiles Maven project and caches dependencies
# 2. Test: Runs unit and integration tests with coverage reports
# 3. Code Quality: Analyzes code with SpotBugs, CheckStyle, PMD
# 4. Security: Scans dependencies and filesystem for vulnerabilities
# 5. Docker: Builds and pushes Docker image to GitHub Container Registry
# 6. Deploy: Deploys to production (only on main branch)
# 7. Notify: Sends notifications on build completion

