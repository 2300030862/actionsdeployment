name: Java CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: ['17']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'adopt'
        cache: maven

    - name: Build with Maven
      run: mvn clean install -DskipTests

    - name: Run Tests
      run: mvn test

    - name: Generate Test Report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Maven Tests Report
        path: 'target/surefire-reports/*.xml'
        reporter: 'java-junit'
        fail-on-error: true

    - name: SonarQube Scan
      if: success()
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: mvn sonar:sonar -Dsonar.projectKey=deployment-service -Dsonar.sources=src/main -Dsonar.tests=src/test -Dsonar.java.binaries=target/classes || true

    - name: Upload Test Coverage
      if: always()
      uses: codecov/codecov-action@v3
      with:
        files: ./target/site/jacoco/index.html
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Notify on Success
      if: success()
      run: echo "Build completed successfully!"

    - name: Notify on Failure
      if: failure()
      run: echo "Build failed!"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'adopt'
        cache: maven

    - name: Build Docker Image
      run: |
        mvn clean package -DskipTests
        docker build -t deployment-service:latest .
      env:
        DOCKER_BUILDKIT: 1

    - name: Login to Docker Hub
      if: success()
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image
      if: success()
      run: |
        docker tag deployment-service:latest ${{ secrets.DOCKER_USERNAME }}/deployment-service:latest
        docker tag deployment-service:latest ${{ secrets.DOCKER_USERNAME }}/deployment-service:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/deployment-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/deployment-service:${{ github.sha }}

    - name: Deploy to Production
      if: success()
      run: echo "Deployment to production can be configured here"

